name: Check migrations are current
description: Regenerate migrations from each package's schema and fail if the result differs from what is committed

runs:
  using: composite
  steps:
    # Regenerating from the schema must produce nothing new: a diff means a
    # schema edit landed without its generated migration.
    - shell: bash
      run: |
        bun run db:generate
        changed="$(git status --porcelain sdk/*/src/infra/db/*/migration)"
        if [ -n "$changed" ]; then
          echo "migrations are out of date — run db:generate and commit the result:" >&2
          echo "$changed" >&2
          exit 1
        fi
