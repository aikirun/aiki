name: Release

# Cutting a release: bun run bump <version>, commit, get it onto main, then run
# this workflow (gh workflow run release.yml, or the Run workflow button). The
# version comes from the committed types/package.json — there is no input.
#
# verify runs the full battery first; only when it passes does the tag job
# create and push v<version>. A failed verify creates no tag, so a bad release
# leaves nothing to clean up. Steps run in a fixed order with npm publish last —
# it is the only irreversible step, so nothing a user installs ships until
# everything before it succeeded. deploy-cloud is the hosted deployment's slice
# of the pipeline; it is the part that would move out if hosting ever gets its
# own repo.

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Everything here runs before any side effect: a failure aborts the release
  # with nothing pushed, migrated, or published.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.lockstep.outputs.version }}
    steps:
      - name: Releases run from main only
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "releases must be dispatched from main, got $GITHUB_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: lockstep
        uses: ./.github/actions/check-lockstep

      # If this version was already tagged: 
      #  The tag is at the current commit - it is a heal re-run, continue
      #  The tag is at a different commit - commits landed since the release without a bump, fail
      - name: Guard against re-releasing a version at a different commit
        env:
          VERSION: ${{ steps.lockstep.outputs.version }}
        run: |
          tag="v$VERSION"
          # Query the remote, not the local checkout: a shallow clone may not
          # have the tag's commit object, and the remote is the push target that
          # must not collide. Compare the peeled commit an annotated tag points
          # to, falling back to the ref itself for a lightweight tag.
          tagged_sha="$(git ls-remote --tags origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [ -z "$tagged_sha" ]; then
            tagged_sha="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
          fi
          if [ -n "$tagged_sha" ] && [ "$tagged_sha" != "$GITHUB_SHA" ]; then
            echo "tag $tag already exists at $tagged_sha, not $GITHUB_SHA — run bun run bump" >&2
            exit 1
          fi

      - uses: ./.github/actions/setup-workspace

      - run: bun run check

      - run: bun run lint

      - run: bun test

      - uses: ./.github/actions/check-migrations

      - run: bun run build:packages

      # Prove each package's built tarball ships migrations byte-identical to
      # the source, for every provider it has schema sources for, before
      # anything ships anywhere.
      - name: Verify packed tarballs match the source migrations
        run: |
          for dir in sdk/*; do
            ls "$dir"/src/infra/db/*/migration >/dev/null 2>&1 || continue
            tarball="$(cd "$dir" && bun pm pack --quiet | tail -n 1)"
            workdir="$(mktemp -d)"
            tar -xzf "$dir/$tarball" -C "$workdir"
            for schema_dir in "$dir"/src/infra/db/*/migration; do
              [ -d "$schema_dir" ] || continue
              provider="$(basename "$(dirname "$schema_dir")")"
              if ! diff -r "$schema_dir" "$workdir/package/dist/infra/db/$provider/migration"; then
                echo "$dir tarball's $provider migrations differ from source" >&2
                exit 1
              fi
            done
            rm -rf "$workdir" "$dir/$tarball"
          done

      - name: Compile the aiki binaries
        working-directory: cli
        run: |
          bun scripts/generate-embedded-data.ts
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-arm64; do
            bun build src/index.ts --compile --target="$target" --outfile "dist/aiki-${target#bun-}"
          done

      - name: Smoke-test the linux-x64 binary
        env:
          DATABASE_PROVIDER: pg
        run: |
          chmod +x cli/dist/aiki-linux-x64
          cli/dist/aiki-linux-x64 migrate list --package server,iam

      - name: Upload the aiki binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aiki-binaries
          path: cli/dist/aiki-*
          if-no-files-found: error

  # The first side effect: the tag records that this commit passed verify. It is
  # created before any image or package ships, so every downstream artifact
  # corresponds to a real tag. verify already failed the run if the tag exists at
  # a different commit, so here a tag that exists is a heal re-run at this same
  # commit — skip it — and otherwise we create.
  tag:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    env:
      VERSION: ${{ needs.verify.outputs.version }}
    steps:
      # A GitHub App token, not the default GITHUB_TOKEN: 
      # The app is the only identity allowed to create tags. 
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create and push the release tag
        run: |
          tag="v$VERSION"
          # verify already failed the run if the tag exists at another commit,
          # so a tag on the remote here is a heal re-run at this same commit.
          if [ -n "$(git ls-remote --tags origin "refs/tags/$tag")" ]; then
            echo "tag $tag already present on the remote — heal re-run, nothing to do"
            exit 0
          fi
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag" "$GITHUB_SHA"
          git push origin "$tag"

  images:
    needs: [verify, tag]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - image: server
            dockerfile: app/server/Dockerfile
          - image: dashboard
            dockerfile: app/dashboard/Dockerfile
          - image: cli
            dockerfile: cli/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for smoke test
        if: matrix.image != 'server'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: aikirun/${{ matrix.image }}:smoke
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Smoke test dashboard nginx config
        if: matrix.image == 'dashboard'
        run: docker run --rm -e AIKI_SERVER_UPSTREAM_URL=http://127.0.0.1:9850 aikirun/dashboard:smoke nginx -t

      - name: Smoke test cli package resolution
        if: matrix.image == 'cli'
        run: |
          docker run --rm -e DATABASE_PROVIDER=pg aikirun/cli:smoke migrate list --package server
          docker run --rm -e DATABASE_PROVIDER=pg aikirun/cli:smoke migrate list --package iam

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/aikirun/${{ matrix.image }}:${{ needs.verify.outputs.version }}
            ghcr.io/aikirun/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # The hosted deployment: migrate its database, roll its server to the new
  # image, publish its dashboard. Secrets and vars live in the release
  # environment.
  deploy-cloud:
    needs: [verify, images]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    env:
      VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-workspace

      - name: Migrate the hosted database
        env:
          DATABASE_PROVIDER: ${{ vars.DATABASE_PROVIDER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_CA_CERT: ${{ secrets.DATABASE_CA_CERT }}
        run: |
          bun sdk/server/src/bin.ts migrate apply
          bun sdk/iam/src/bin.ts migrate apply

      # Redeploy by name and override the server component's image tag to this
      # release's version. The action waits for the deploy, fails the step if it
      # errors, and prints the deploy logs.
      - name: Redeploy the hosted server
        uses: digitalocean/app_action/deploy@0b2a11724d565a7206d1e8aaddcd769cac04c8ec # v2.0.11
        env:
          IMAGE_TAG_AIKI_SERVER: ${{ needs.verify.outputs.version }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_name: ${{ vars.DIGITALOCEAN_APP_NAME }}
          print_build_logs: "true"
          print_deploy_logs: "true"

      - name: Confirm the release version is serving
        run: |
          for attempt in $(seq 1 12); do
            deployed="$(curl -fsS --max-time 5 "${{ vars.AIKI_SERVER_BASE_URL }}/capabilities" | jq -r .version 2>/dev/null || true)"
            if [ "$deployed" = "$VERSION" ]; then
              echo "hosted server reports $VERSION"
              exit 0
            fi
            sleep 5
          done
          echo "hosted server does not report version $VERSION" >&2
          exit 1

      - name: Deploy the hosted dashboard to Cloudflare Pages
        env:
          VITE_AIKI_SERVER_URL: ${{ vars.AIKI_SERVER_BASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bun run build:dashboard
          bunx wrangler@4 pages deploy app/dashboard/dist --project-name "${{ vars.CLOUDFLARE_PAGES_PROJECT }}" --branch=main

  # The public artifacts: npm packages and the GitHub release page.
  publish:
    needs: [verify, tag, deploy-cloud]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    env:
      VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-workspace

      - run: bun run build:packages

      # Already-published packages are skipped so a re-run after a partial
      # publish heals the gap instead of failing on the first package that
      # made it through.
      - name: Publish npm packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}
        run: |
          for dir in types sdk/workflow sdk/client sdk/adapter/redis sdk/worker sdk/endpoint sdk/server sdk/iam; do
            name="$(jq -r .name "$dir/package.json")"
            if npm view "$name@$VERSION" version > /dev/null 2>&1; then
              echo "$name@$VERSION already published; skipping"
              continue
            fi
            (cd "$dir" && bun publish --access public)
          done

      - name: Download the aiki binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aiki-binaries
          path: binaries

      # The standalone compose file and the per-platform aiki binaries are
      # attached as assets so releases/latest/download/ always serves the
      # newest release's pins and executables. Safe to re-run: upload replaces
      # the assets.
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$VERSION"
          assets="deploy/docker-compose.yml binaries/aiki-linux-x64 binaries/aiki-linux-arm64 binaries/aiki-darwin-arm64"
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" $assets --clobber
          else
            gh release create "$tag" --title "$tag" --generate-notes $assets
          fi
