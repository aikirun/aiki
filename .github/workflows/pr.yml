name: Checks

on:
  pull_request:
  push:
    branches: [main]

# Key on head_ref for PRs (so new pushes supersede in-flight runs) but on the
# sha for main pushes (head_ref is empty there, so each commit is its own group
# and none cancel each other).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/check-lockstep

      - uses: ./.github/actions/setup-workspace

      - name: Generate website types
        run: bun run website:generate

      - name: Typecheck
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - uses: ./.github/actions/check-migrations

      - name: Build
        run: bun run build
