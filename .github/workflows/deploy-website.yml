name: Deploy website

# Deploys the website (the static content in docs/) to GitHub Pages.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (blank = the branch you run this from)
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy (blank = the caller's ref)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; never cancel a publish already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # docs/ is served as-is (it carries its own CNAME and index.html); there is no
      # build step, so the folder is uploaded verbatim.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deploy
