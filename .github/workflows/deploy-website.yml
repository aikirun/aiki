name: Deploy website

# Deploys the website (the static content in docs/) to GitHub Pages.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (blank = the branch you run this from)
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy (blank = the caller's ref)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; never cancel a publish already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      # docs/ is served as-is (it carries its own CNAME and index.html); there is no
      # build step, so the folder is uploaded verbatim.
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        id: deploy
